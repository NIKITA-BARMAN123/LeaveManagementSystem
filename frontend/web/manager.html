<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manager - AI Leave Agent</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- 🔷 HEADER -->
  <header class="header">
    <div>
      <h2>Manager Panel</h2>
      <div class="small">Logged in as: <span id="who"></span></div>
    </div>

    <div class="header-right">
      <button onclick="window.location.href='dashboard.html'">Dashboard</button>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- 🔷 MAIN -->
  <main class="main-content">
    <div class="container">

      <div class="admin-grid-l">
      <div class="card-l section-card" id="pending-requests" style="text-align: center;">
        <div class="section-title-row">
          <h3 style="margin: 0 auto;">View Pending Request</h3>
          <span id="pendingBadge" class="notif-badge" style="display:none;">0</span>
        </div>

        <button onclick="refreshPendingRequestsWithLog()">Refresh Pending Requests</button>
        <div id="pendingRequestsOut" style="margin-top:12px; overflow-x:auto"></div>
      </div>

      <div style="text-align: center;overflow-x:auto;" class="card-l section-card" id="history-requests">
        <h3>View Approved / Rejected History</h3>
        <button onclick="refreshHistoryRequestsWithLog()">Refresh History</button>
        <div id="historyRequestsOut" style="margin-top:12px;"></div>
      </div>
      </div>

    </div>
  </main>

  <!-- 🔷 FOOTER -->
  <footer class="footer">
    <p>© 2026 AI Leave Management System</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/manager.js"></script>

  <script>
    function showOnlySelectedSection() {
      const hash = window.location.hash;
      const sections = document.querySelectorAll(".section-card");

      if (!hash) {
        sections.forEach(section => section.style.display = "block");
        return;
      }

      const selected = document.querySelector(hash);

      if (!selected) {
        sections.forEach(section => section.style.display = "block");
        return;
      }

      sections.forEach(section => {
        section.style.display = ("#" + section.id === hash) ? "block" : "none";
      });
    }

    window.addEventListener("load", showOnlySelectedSection);
  </script>

</body>
</html>
